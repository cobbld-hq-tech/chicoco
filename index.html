<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chicoco — Concept Preview</title>
<meta name="description" content="Concept preview for Chicoco — two homepage directions for a Chicago-style roasted-chicken food truck in the Permian Basin, Texas.">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/chicoco-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@700;900&family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C4443C;
    --ink:#242424;
    --bar:#1c1c1c;
    --line:rgba(255,255,255,.14);
    --mut:rgba(255,255,255,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:#e9e6df;
    font-family:'Archivo',Arial,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100%;
  }

  /* ---------- Control bar ---------- */
  .bar{
    position:sticky;top:0;z-index:50;
    background:var(--bar);color:#fff;
    border-bottom:2px solid rgba(0,0,0,.3);
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:11px clamp(14px,3vw,28px);
  }
  .brand{display:flex;align-items:center;gap:11px;flex:none}
  .brand img{width:40px;height:auto;display:block}
  .brand .t{line-height:1.05}
  .brand .t b{font:900 17px 'Passion One',Impact,sans-serif;letter-spacing:.5px;display:block}
  .brand .t span{font:700 9px 'Space Mono',monospace;letter-spacing:2px;color:var(--mut)}

  .controls{display:flex;gap:16px;flex-wrap:wrap;flex:1;justify-content:center}
  .group{display:flex;align-items:center;gap:9px}
  .group>.lab{font:700 9px 'Space Mono',monospace;letter-spacing:2px;color:var(--mut)}
  .seg{display:flex;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{
    appearance:none;border:0;background:transparent;color:rgba(255,255,255,.72);
    font:700 12.5px 'Archivo';letter-spacing:.3px;cursor:pointer;
    padding:8px 15px;border-radius:7px;transition:.15s;white-space:nowrap;
  }
  .seg button:hover{color:#fff}
  .seg button[aria-pressed="true"]{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}

  .open{
    flex:none;text-decoration:none;color:#fff;
    font:700 11px 'Space Mono',monospace;letter-spacing:1px;
    border:1px solid var(--line);border-radius:8px;padding:9px 13px;
    transition:.15s;
  }
  .open:hover{background:rgba(255,255,255,.1)}

  /* ---------- Stage ---------- */
  .notice{
    display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;
    background:#F2EDE2;border-bottom:1px solid rgba(0,0,0,.08);
    padding:9px 16px;text-align:center;
  }
  .notice .tag{
    flex:none;font:700 9px 'Space Mono',monospace;letter-spacing:1.5px;color:#fff;
    background:var(--red);padding:4px 9px;border-radius:5px;
  }
  .notice .msg{font:600 12px 'Archivo';color:#7a7266}
  .notice .msg b{color:#4a443c}

  .caption{
    text-align:center;padding:16px 16px 4px;
    font:700 10px 'Space Mono',monospace;letter-spacing:2px;color:#8a8377;
  }
  .caption b{color:var(--red)}
  .stagewrap{flex:1;padding:14px clamp(10px,3vw,32px) 40px;display:flex;justify-content:center}
  .stage{position:relative;width:100%;max-width:1320px;transition:height .25s ease}

  .device{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    opacity:0;pointer-events:none;transition:opacity .25s ease;
  }
  .device.active{opacity:1;pointer-events:auto;z-index:2}

  .chrome{
    display:flex;align-items:center;gap:8px;
    background:#dcdcdc;border:1px solid rgba(0,0,0,.14);border-bottom:none;
    border-radius:11px 11px 0 0;padding:9px 13px;
  }
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .chrome .url{
    flex:1;background:#fff;border-radius:6px;padding:5px 10px;
    font:500 11px 'Space Mono',monospace;color:#8a8a8a;text-align:center;
  }
  .screen{
    position:relative;overflow:hidden;background:#fff;
    border:1px solid rgba(0,0,0,.16);
  }
  .screen iframe{position:absolute;top:0;left:0;border:0;transform-origin:top left;background:#fff}

  /* desktop look */
  .device.is-desktop .screen{border-radius:0 0 11px 11px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
  .device.is-desktop .chrome{display:flex}

  /* mobile look */
  .device.is-mobile{background:#1a1a1a;border-radius:44px;padding:13px;box-shadow:0 28px 60px rgba(0,0,0,.3)}
  .device.is-mobile .chrome{display:none}
  .device.is-mobile .screen{border-radius:30px;border:0}

  .loading{
    position:absolute;inset:0;display:grid;place-items:center;z-index:5;
    background:#e9e6df;pointer-events:none;transition:opacity .3s;
    font:700 10px 'Space Mono',monospace;letter-spacing:2px;color:#a59e91;
  }
  .loading.hide{opacity:0}
</style>
</head>
<body>

  <div class="bar">
    <div class="brand">
      <img src="assets/chicoco-logo-white.png" alt="Chicoco">
      <div class="t"><b>CHICOCO</b><span>CONCEPT PREVIEW</span></div>
    </div>

    <div class="controls">
      <div class="group">
        <span class="lab">DESIGN</span>
        <div class="seg" id="seg-design">
          <button data-design="truck" aria-pressed="true">Truck Paint</button>
          <button data-design="order" aria-pressed="false">Order Window</button>
        </div>
      </div>
      <div class="group">
        <span class="lab">VIEW</span>
        <div class="seg" id="seg-view">
          <button data-view="desktop" aria-pressed="true">Desktop</button>
          <button data-view="mobile" aria-pressed="false">Mobile</button>
        </div>
      </div>
    </div>

    <a class="open" id="openFull" href="#" target="_blank" rel="noopener">OPEN FULL PAGE ↗</a>
  </div>

  <div class="notice">
    <span class="tag">DRAFT</span>
    <span class="msg">These are <b>draft concepts</b> — photos are placeholders, final images still to come.</span>
  </div>

  <div class="caption">SHOWING <b id="capDesign">TRUCK PAINT</b> · <span id="capView">DESKTOP</span></div>

  <div class="stagewrap">
    <div class="stage" id="stage">
      <div class="loading" id="loading">LOADING PREVIEW…</div>
      <!-- devices injected by JS -->
    </div>
  </div>

<script>
(function () {
  var PAGES = {
    truck: { src: 'Chicoco%20-%20Truck%20Paint.dc.html',  name: 'Truck Paint',  bg:'#C4443C' },
    order: { src: 'Chicoco%20-%20Order%20Window.dc.html', name: 'Order Window', bg:'#ffffff' }
  };
  // sensible starting heights until the real content is measured
  var FALLBACK = {
    truck: { desktop: 2600, mobile: 3900 },
    order: { desktop: 2300, mobile: 3100 }
  };
  var LOGICAL = { desktop: 1280, mobile: 390 };
  var BEZEL = 26; // mobile phone padding (13px * 2)

  var state = { design: 'truck', view: 'desktop' };
  var stage = document.getElementById('stage');
  var loading = document.getElementById('loading');
  var devices = {};

  // ---- build the two device shells, both kept loaded so switching is instant ----
  Object.keys(PAGES).forEach(function (key) {
    var d = document.createElement('div');
    d.className = 'device';
    d.innerHTML =
      '<div class="chrome">' +
        '<span class="dot" style="background:#ff5f57"></span>' +
        '<span class="dot" style="background:#febc2e"></span>' +
        '<span class="dot" style="background:#28c840"></span>' +
        '<div class="url">chicoco.com</div>' +
      '</div>' +
      '<div class="screen"><iframe title="' + PAGES[key].name + '" loading="eager"></iframe></div>';
    stage.appendChild(d);
    var iframe = d.querySelector('iframe');
    iframe.src = PAGES[key].src;
    devices[key] = { wrap: d, chrome: d.querySelector('.chrome'), screen: d.querySelector('.screen'), iframe: iframe, ready: false };
    iframe.addEventListener('load', function () { devices[key].ready = true; hideLoaderMaybe(); layout(); });
  });

  function hideLoaderMaybe(){ if (devices[state.design] && devices[state.design].ready) loading.classList.add('hide'); }

  function measure(iframe) {
    try {
      var doc = iframe.contentWindow.document;
      var h = Math.max(doc.documentElement.scrollHeight, doc.body ? doc.body.scrollHeight : 0);
      return h > 60 ? h : null;
    } catch (e) { return null; }
  }

  function sizeDevice(key) {
    var dev = devices[key];
    var view = state.view;
    var logical = LOGICAL[view];
    var pad = view === 'mobile' ? BEZEL : 0;
    var avail = stage.clientWidth;
    var scale = Math.min(1, avail / (logical + pad));
    var h = measure(dev.iframe) || FALLBACK[key][view];

    dev.wrap.className = 'device ' + (view === 'mobile' ? 'is-mobile' : 'is-desktop') + (key === state.design ? ' active' : '');

    var screenW = logical * scale;
    dev.screen.style.width = screenW + 'px';
    dev.screen.style.height = (h * scale) + 'px';
    dev.chrome.style.width = screenW + 'px';
    dev.iframe.style.width = logical + 'px';
    dev.iframe.style.height = h + 'px';
    dev.iframe.style.transform = 'scale(' + scale + ')';
    return dev.wrap;
  }

  function layout() {
    // size both so the inactive one is measured & ready to reveal instantly
    sizeDevice('truck');
    sizeDevice('order');
    // stage height follows the active device's real box
    var active = devices[state.design].wrap;
    requestAnimationFrame(function () {
      stage.style.height = active.getBoundingClientRect().height + 'px';
    });
  }

  function apply() {
    document.getElementById('capDesign').textContent = PAGES[state.design].name.toUpperCase();
    document.getElementById('capView').textContent = state.view.toUpperCase();
    var full = document.getElementById('openFull');
    full.href = PAGES[state.design].src;
    // reflect pressed states
    document.querySelectorAll('#seg-design button').forEach(function (b) {
      b.setAttribute('aria-pressed', String(b.dataset.design === state.design));
    });
    document.querySelectorAll('#seg-view button').forEach(function (b) {
      b.setAttribute('aria-pressed', String(b.dataset.view === state.view));
    });
    hideLoaderMaybe();
    layout();
  }

  document.getElementById('seg-design').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    state.design = b.dataset.design; apply();
  });
  document.getElementById('seg-view').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    state.view = b.dataset.view; apply();
  });

  var rafPending = false;
  window.addEventListener('resize', function () {
    if (rafPending) return; rafPending = true;
    requestAnimationFrame(function () { rafPending = false; layout(); });
  });

  // keep correcting height as fonts / images / the map settle in
  setInterval(layout, 900);

  apply();
})();
</script>
</body>
</html>
